[env]
; Common environment settings
platform = espressif8266
framework = arduino
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
upload_speed = 921600
test_build_src = no
test_upload_protocol = esptool

[platformio]
; Show verbose output during debugging
; Enabled by default, comment out for verbose output
default_envs = esp8266_d1_mini

; Directory configuration
src_dir = src
test_dir = test

[env:esp8266_d1_mini]
; Wemos D1 Mini (most common ESP8266 board)
board = d1_mini
board_build.flash_mode = dout
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L
board_build.flash_size = 4MB

; Memory settings
board_build.ldscript_path = eagle.flash.4m.ld

; Libraries
lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0

; Build flags
build_flags =
    -DARDUINO_ESP8266_WEMOS_D1MINI
    -Wall
    -Werror=return-type

; OTA settings (configure locally for wireless uploads)
; upload_protocol = espota
; upload_port = esp-weather-clock.local
; upload_username = admin
; upload_password = change_me

[env:esp8266_nodmcu]
; NodeMCU (alternative ESP8266 board)
board = nodemcuv2
board_build.flash_mode = dout
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L
board_build.flash_size = 4MB

lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0

build_flags =
    -DARDUINO_ESP8266_NODEMCU
    -Wall
    -Werror=return-type

[env:esp8266_generic]
; Generic ESP8266 module (3.3V, GPIO0/2 pins)
board = esp12e
board_build.ldscript_path = eagle.flash.1m.ld
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L
board_build.flash_size = 1MB

lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0

build_flags =
    -DARDUINO_ESP8266_GENERIC
    -Wall
    -Werror=return-type

; Recommended to use web upload for this board

[env:debug]
; Debug environment with extra logging
board = d1_mini
build_type = debug
build_flags =
    -DARDUINO_ESP8266_WEMOS_D1MINI
    -DDEBUG_ENABLED
    -Wall
    -Werror=return-type

lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0
