[env]
; Common environment settings
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
upload_speed = 921600
test_build_src = no

[env:native]
; Linux/desktop unit tests (no ESP8266 hardware required)
platform = native
test_framework = unity
test_filter = test_native_*
test_build_src = yes
build_flags =
    -DNATIVE_TEST
    -std=gnu++11

[platformio]
; Show verbose output during debugging
; Enabled by default, comment out for verbose output
default_envs = esp8266_d1_mini

; Directory configuration
src_dir = src
test_dir = test

[env:esp8266_d1_mini]
; Wemos D1 Mini (most common ESP8266 board)
platform = espressif8266
framework = arduino
board = d1_mini
board_build.flash_mode = dout
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L

; Memory settings - 4MB flash with  proper LD script
board_build.ldscript = eagle.flash.4m2m.ld

; Libraries
lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

; Build flags
build_flags =
    -DARDUINO_ESP8266_WEMOS_D1MINI
    -DNATIVE_TEST
    -Wall
    -Werror=return-type

; OTA settings (configure locally for wireless uploads)
; upload_protocol = espota
; upload_port = esp-oled-experiment.local
; upload_username = admin
; upload_password = change_me

[env:esp8266_nodmcu]
; NodeMCU (alternative ESP8266 board)
platform = espressif8266
framework = arduino
board = nodemcuv2
board_build.flash_mode = dout
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L

; Memory settings - 4MB flash with proper LD script
board_build.ldscript = eagle.flash.4m2m.ld

lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

build_flags =
    -DARDUINO_ESP8266_NODEMCU
    -Wall
    -Werror=return-type

[env:esp8266_generic]
; Generic ESP8266 module (3.3V, GPIO0/2 pins)
; WARNING: 1MB flash is very limited. Firmware is ~354KB, leaving ~690KB for spiffs.
; OTA updates add significant overhead and may not fit. Use serial upload instead:
;   pio run -e esp8266_generic -t upload
; If getting "new Flash config wrong" error on upload, device likely has 1MB flash.
platform = espressif8266
framework = arduino
board = esp12e
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L

; Memory settings - 1MB flash with minimal SPIFFS
board_build.ldscript = eagle.flash.1m64.ld

lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

build_flags =
    -DARDUINO_ESP8266_GENERIC
    -Wall
    -Werror=return-type

; Recommended to use serial upload for this board
; pio run -e esp8266_generic -t upload

[env:debug]
; Debug environment with extra logging
platform = espressif8266
framework = arduino
board = d1_mini
build_type = debug
build_flags =
    -DARDUINO_ESP8266_WEMOS_D1MINI
    -DDEBUG_ENABLED
    -Wall
    -Werror=return-type

lib_deps =
    bxparks/AUnit @ ^1.7.1
    olikraus/U8g2 @ ^2.35.9
    ayushsharma82/ElegantOTA @ ^3.1.0
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
