# Markdown linting configuration
default: true

# Line length - disable for code blocks
MD013: false

# Allow inline HTML (useful for badges, etc.)
MD033: false

# Allow duplicate headers (common in READMEs)
MD024:
  siblings_only: true

# First line doesn't need to be h1
MD041: false

# Allow emphasized text where heading-like callouts are used
MD036: false

# Allow unlabeled fenced code blocks
MD040: false

# Allow ordered list numbering styles other than strict 1/1/1
MD029: false
