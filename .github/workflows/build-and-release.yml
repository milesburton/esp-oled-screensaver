name: Build and Release Firmware

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  packages: read

env:
  PYTHON_VERSION: 3.11
  PLATFORMIO_VERSION: 6.1.16

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      release_notes: ${{ steps.generate-notes.outputs.notes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current-version
        run: |
          CURRENT=$(grep 'FW_VERSION.*=' src/Config.h | grep -oP 'platform-\K[0-9.]+')
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Current firmware version: ${CURRENT}"

      - name: Determine version bump type
        id: bump-type
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline)
          fi
          
          echo "Recent commits:"
          echo "$COMMITS"
          
          # Check for breaking changes or types
          if echo "$COMMITS" | grep -qE "^.+!:|BREAKING CHANGE"; then
            echo "bump=major" >> $GITHUB_OUTPUT
            echo "Detected BREAKING CHANGE - Major version bump"
          elif echo "$COMMITS" | grep -qE "^feat"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
            echo "Detected feat: - Minor version bump"
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "Detected fix/chore/docs - Patch version bump"
          fi

      - name: Calculate new version
        id: new-version
        run: |
          CURRENT="${{ steps.current-version.outputs.current }}"
          BUMP="${{ steps.bump-type.outputs.bump }}"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "new_tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "New version: ${NEW_VERSION}"

      - name: Check if version already released
        id: check-tag
        run: |
          TAG="${{ steps.new-version.outputs.new_tag }}"
          if git rev-parse "$TAG" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists - skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG is new - proceeding with release"
          fi

      - name: Update firmware version in Config.h
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new-version.outputs.new }}"
          sed -i "s/FW_VERSION = \"platform-[0-9.]*\"/FW_VERSION = \"platform-${NEW_VERSION}\"/" src/Config.h
          echo "Updated Config.h to version ${NEW_VERSION}"
          grep 'FW_VERSION' src/Config.h

      - name: Commit version bump
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add src/Config.h
          git commit -m "chore: bump version to ${{ steps.new-version.outputs.new }}" || echo "No changes to commit"
          git push origin main

      - name: Set up Python
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install PlatformIO
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install platformio==${{ env.PLATFORMIO_VERSION }}

      - name: Build firmware for D1 Mini
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          rm -rf .pio build
          pio run -e esp8266_d1_mini

      - name: Build firmware for NodeMCU
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          pio run -e esp8266_nodmcu

      - name: Build firmware for Generic ESP8266
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          pio run -e esp8266_generic

      - name: Copy binaries to release folder
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          mkdir -p release
          cp .pio/build/esp8266_d1_mini/firmware.bin release/esp8266-oled-experiment_${{ steps.new-version.outputs.new_tag }}_esp8266_d1_mini.bin
          cp .pio/build/esp8266_nodmcu/firmware.bin release/esp8266-oled-experiment_${{ steps.new-version.outputs.new_tag }}_esp8266_nodmcu.bin
          cp .pio/build/esp8266_generic/firmware.bin release/esp8266-oled-experiment_${{ steps.new-version.outputs.new_tag }}_esp8266_generic.bin
          ls -lh release/*.bin

      - name: Generate SHA256 checksums
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          cd release
          for file in esp8266-oled-experiment_${{ steps.new-version.outputs.new_tag }}_*.bin; do
            sha256sum "$file" > "${file}.sha256"
            cat "${file}.sha256"
          done

      - name: Generate release notes
        id: generate-notes
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMIT_LOG=$(git log --pretty=format:"- %h: %s")
          else
            COMMIT_LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %h: %s")
          fi
          
          NOTES=$(cat <<EOF
          ## Firmware Release ${{ steps.new-version.outputs.new_tag }}
          
          ### Version: ${{ steps.new-version.outputs.new }} (${{ steps.bump-type.outputs.bump }} bump)
          
          ### Changes
          \`\`\`
          ${COMMIT_LOG}
          \`\`\`
          
          ### Build Information
          - **D1 Mini** (WEMOS D1 mini) - 4MB Flash
          - **NodeMCU** (ESP8266 NodeMCU) - 4MB Flash
          - **Generic** (ESP8266 generic/esp12e) - 1MB Flash
          
          ### Firmware Features
          - Modular display mode system (Status, Boing, Weather)
          - WiFi connectivity with OTA updates
          - RESTful web interface for configuration
          - Telnet console for remote debugging
          - Comprehensive system diagnostics on home page
          - EEPROM-based credential storage
          - Display rotation support (0°, 90°, 180°, 270°)
          
          ### Installation
          Use the OTA Update feature at \`http://<device-ip>/update\` or flash directly with esptool.
          
          ### SHA256 Checksums
          Verify binary integrity:
          \`\`\`
          sha256sum -c *.sha256
          \`\`\`
          EOF
          )
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: release/
          retention-days: 30

      - name: Create Release
        if: steps.check-tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.new-version.outputs.new_tag }}
          name: "Firmware ${{ steps.new-version.outputs.new_tag }}"
          body: ${{ steps.generate-notes.outputs.notes }}
          files: |
            release/esp8266-oled-experiment_${{ steps.new-version.outputs.new_tag }}_*.bin
            release/esp8266-oled-experiment_${{ steps.new-version.outputs.new_tag }}_*.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Build Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-tag.outputs.exists }}" = "true" ]; then
            echo "✅ **Version already released**: Tag ${{ steps.new-version.outputs.new_tag }} exists" >> $GITHUB_STEP_SUMMARY
            echo "No new release created." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **New firmware release**: ${{ steps.new-version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
            echo "- Version bumped: ${{ steps.current-version.outputs.current }} → ${{ steps.new-version.outputs.new }} (${{ steps.bump-type.outputs.bump }})" >> $GITHUB_STEP_SUMMARY
            echo "- D1 Mini binary created ✓" >> $GITHUB_STEP_SUMMARY
            echo "- NodeMCU binary created ✓" >> $GITHUB_STEP_SUMMARY
            echo "- Generic binary created ✓" >> $GITHUB_STEP_SUMMARY
            echo "- Release published to GitHub ✓" >> $GITHUB_STEP_SUMMARY
          fi
