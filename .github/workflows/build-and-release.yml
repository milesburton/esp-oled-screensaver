name: Build and Release Firmware

on:
  push:
    branches:
      - main
      - master

env:
  PYTHON_VERSION: 3.11
  PLATFORMIO_VERSION: 6.1.16

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      release_notes: ${{ steps.generate-notes.outputs.notes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract firmware version
        id: get-version
        run: |
          VERSION=$(grep 'FW_VERSION.*=' src/Config.h | grep -oP 'platform-\K[0-9.]+')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Firmware version: v${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio==${{ env.PLATFORMIO_VERSION }}

      - name: Check if version tag already exists
        id: check-tag
        run: |
          if git rev-parse ${{ steps.get-version.outputs.version }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.get-version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.get-version.outputs.version }} is new"
          fi

      - name: Build firmware for D1 Mini
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          rm -rf .pio build
          pio run -e esp8266_d1_mini

      - name: Build firmware for NodeMCU
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          pio run -e esp8266_nodmcu

      - name: Build firmware for Generic ESP8266
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          pio run -e esp8266_generic

      - name: Copy binaries to release folder
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          mkdir -p release
          cp .pio/build/esp8266_d1_mini/firmware.bin release/esp8266-oled-experiment_${{ steps.get-version.outputs.version }}_esp8266_d1_mini.bin
          cp .pio/build/esp8266_nodmcu/firmware.bin release/esp8266-oled-experiment_${{ steps.get-version.outputs.version }}_esp8266_nodmcu.bin
          cp .pio/build/esp8266_generic/firmware.bin release/esp8266-oled-experiment_${{ steps.get-version.outputs.version }}_esp8266_generic.bin
          ls -lh release/*.bin

      - name: Generate SHA256 checksums
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          cd release
          for file in esp8266-oled-experiment_${{ steps.get-version.outputs.version }}_*.bin; do
            sha256sum "$file" > "${file}.sha256"
            cat "${file}.sha256"
          done

      - name: Generate release notes
        id: generate-notes
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          NOTES=$(cat <<EOF
          ## Firmware Release ${{ steps.get-version.outputs.version }}
          
          ### Latest Changes
          \`\`\`
          ${COMMIT_MSG}
          \`\`\`
          
          ### Build Information
          - **D1 Mini** (WEMOS D1 mini) - 4MB Flash
          - **NodeMCU** (ESP8266 NodeMCU) - 4MB Flash
          - **Generic** (ESP8266 generic/esp12e) - 1MB Flash
          
          ### Firmware Features
          - Modular display mode system (Status, Boing, Weather)
          - WiFi connectivity with OTA updates
          - RESTful web interface for configuration
          - Telnet console for remote debugging
          - Comprehensive system diagnostics on home page
          - EEPROM-based credential storage
          - Display rotation support (0°, 90°, 180°, 270°)
          
          ### Installation
          Use the OTA Update feature at \`http://<device-ip>/update\` or flash directly with esptool.
          
          ### SHA256 Checksums
          Verify binary integrity:
          \`\`\`
          sha256sum -c *.sha256
          \`\`\`
          EOF
          )
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        if: steps.check-tag.outputs.exists == 'false'
        uses: actions/upload-artifact@v3
        with:
          name: firmware-binaries
          path: release/
          retention-days: 30

      - name: Create Release
        if: steps.check-tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: "Firmware ${{ steps.get-version.outputs.version }}"
          body: ${{ steps.generate-notes.outputs.notes }}
          files: |
            release/esp8266-oled-experiment_${{ steps.get-version.outputs.version }}_*.bin
            release/esp8266-oled-experiment_${{ steps.get-version.outputs.version }}_*.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Build Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-tag.outputs.exists }}" = "true" ]; then
            echo "✅ **Version already released**: Tag ${{ steps.get-version.outputs.version }} exists" >> $GITHUB_STEP_SUMMARY
            echo "No new release created." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **New firmware release**: ${{ steps.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- D1 Mini binary created ✓" >> $GITHUB_STEP_SUMMARY
            echo "- NodeMCU binary created ✓" >> $GITHUB_STEP_SUMMARY
            echo "- Generic binary created ✓" >> $GITHUB_STEP_SUMMARY
            echo "- Release published to GitHub ✓" >> $GITHUB_STEP_SUMMARY
          fi
