name: Build Firmware

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - esp8266_d1_mini
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version info

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware (${{ matrix.board }})
        run: |
          pio run -e ${{ matrix.board }}

      - name: Check build output
        run: |
          ls -lh .pio/build/${{ matrix.board }}/firmware.bin
          md5sum .pio/build/${{ matrix.board }}/firmware.bin
          sha256sum .pio/build/${{ matrix.board }}/firmware.bin > firmware.sha256
          cat firmware.sha256

      - name: Extract version from Config.h
        id: get_version
        run: |
          VERSION=$(grep 'FW_VERSION.*=.*"' src/Config.h | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Board: ${{ matrix.board }}"
          echo "Version: $VERSION"

      - name: Upload firmware to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            .pio/build/${{ matrix.board }}/firmware.bin
            firmware.sha256
          body: |
            ## Firmware Build Information
            - **Board**: ${{ matrix.board }}
            - **Version**: ${{ steps.get_version.outputs.version }}
            - **Build**: ${{ github.run_number }}
            - **Commit**: ${{ github.sha }}
            
            ### Update Instructions
            1. Download `firmware.bin`
            2. Verify SHA256: `sha256sum -c firmware.sha256`
            3. Upload via web UI: http://device-ip/update (or use ElegantOTA)
            4. Device will auto-reboot
            5. Check Status page for new firmware version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifest for public releases
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          SHA256=$(cat firmware.sha256 | awk '{print $1}')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/firmware.bin"
          
          cat > manifest.json << EOF
          {
            "fw_version": "$VERSION",
            "board": "d1_mini",
            "download_url": "$DOWNLOAD_URL",
            "sha256": "$SHA256",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "channel": "stable"
          }
          EOF
          
          cat manifest.json

      - name: Upload manifest to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log build info
        if: always()
        run: |
          echo "Build completed"
          echo "Board: ${{ matrix.board }}"
          echo "Ref: ${{ github.ref }}"
          echo "Run number: ${{ github.run_number }}"
