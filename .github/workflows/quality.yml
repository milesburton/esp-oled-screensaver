name: Code Quality & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up secrets
        run: cp src/secrets.h.ci src/secrets.h

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native tests
        run: pio test -e native

      - name: Verify ESP8266 firmware compiles
        run: pio run -e esp8266_d1_mini

  lint:
    name: C++ Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format and cpplint
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-format
          pip install cpplint

      - name: clang-format check
        run: |
          find src test -name '*.h' -o -name '*.cpp' -o -name '*.ino' | \
            xargs clang-format --dry-run --Werror

      - name: cpplint check
        run: |
          find src -name '*.h' -o -name '*.cpp' | \
            xargs cpplint --filter=-legal/copyright,-build/include_subdir

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json
