name: Code Quality & Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block CI on linting issues
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: |
          pip install pre-commit
          pre-commit install

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up secrets for testing
        run: |
          cp src/secrets.h.ci src/secrets.h

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          pip install platformio

      - name: Run native Linux tests
        run: |
          echo "Running native tests on Linux..."
          pio test -e native

      - name: Build embedded tests (verify compilation)
        run: |
          echo "Building embedded test firmware..."
          pio test -e esp8266_d1_mini \
            --filter test_Config \
            --filter test_DisplayModes \
            --filter test_Logger \
            --without-testing --without-uploading
          echo "✓ Embedded tests compiled successfully!"

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json

  lint:
    name: C++ Linting
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block CI on formatting issues
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check C++ formatting
        run: |
          echo "NOTE: clang-format check is informational only"
          find . -name "*.ino" -o -name "*.cpp" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror || true

  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [esp8266_d1_mini, esp8266_nodmcu, esp8266_generic]
    steps:
      - uses: actions/checkout@v4

      - name: Set up secrets for build
        run: |
          cp src/secrets.h.ci src/secrets.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Install PlatformIO
        run: |
          pip install platformio

      - name: Build firmware for ${{ matrix.environment }}
        run: |
          pio run -e ${{ matrix.environment }}

      - name: Create firmware artifact
        run: |
          mkdir -p firmware_artifacts
          VERSION=$(grep 'FW_VERSION' src/Config.h | grep -oP '"platform-\K[^"]+')
          cp .pio/build/${{ matrix.environment }}/firmware.bin \
             firmware_artifacts/esp8266-oled-experiment_${VERSION}_${{ matrix.environment }}.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}
          path: firmware_artifacts/
          retention-days: 30
