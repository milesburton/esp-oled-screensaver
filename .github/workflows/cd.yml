name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't block deployment on linting issues
    steps:
      - uses: actions/checkout@v4

      - name: Set up secrets
        run: cp src/secrets.h.ci src/secrets.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install platformio pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files

      - name: Run tests
        run: |
          echo "Running native Linux tests..."
          pio test -e native

          echo "Building embedded test firmware..."
          pio test -e esp8266_d1_mini \
            --filter test_Config \
            --filter test_DisplayModes \
            --filter test_Logger \
            --without-testing --without-uploading

      - name: Build all environments
        run: |
          pio run -e esp8266_d1_mini
          pio run -e esp8266_nodmcu
          pio run -e esp8266_generic

  create-release:
    name: Create Release
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      release_created: ${{ steps.version.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up secrets
        run: cp src/secrets.h.ci src/secrets.h

      - name: Get current version
        id: current_version
        run: |
          CURRENT=$(python3 scripts/version.py current)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Calculate new version
        id: version
        run: |
          BUMP_TYPE="${{ github.event.inputs.version_bump || 'patch' }}"

          NEW_VERSION=$(python3 scripts/version.py bump "$BUMP_TYPE" --write)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_created=true" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in Config.h
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          echo "Updated version to platform-${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Config.h
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git pull --rebase origin main || true
          git push origin main

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

  build-and-release:
    name: Build and Publish Release
    needs: create-release
    if: needs.create-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        environment: [esp8266_d1_mini, esp8266_nodmcu, esp8266_generic]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.create-release.outputs.new_version }}

      - name: Set up secrets
        run: cp src/secrets.h.ci src/secrets.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.environment }}

      - name: Package firmware
        run: |
          mkdir -p release
          VERSION="${{ needs.create-release.outputs.new_version }}"
          ENV="${{ matrix.environment }}"
          FIRMWARE_NAME="esp8266-oled-experiment_v${VERSION}_${ENV}.bin"

          cp .pio/build/${ENV}/firmware.bin "release/${FIRMWARE_NAME}"

          # Create checksum
          cd release
          sha256sum "${FIRMWARE_NAME}" > "${FIRMWARE_NAME}.sha256"
          cd ..

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.environment }}
          path: release/
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    needs: [create-release, build-and-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.create-release.outputs.new_version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release_files
          find artifacts -type f \( -name "*.bin" -o -name "*.sha256" \) -exec cp {} release_files/ \;
          ls -la release_files/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="v${{ needs.create-release.outputs.new_version }}"

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG="Initial release"
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.create-release.outputs.new_version }}
          name: Release v${{ needs.create-release.outputs.new_version }}
          body: |
            ## ESP8266 OLED Screensaver v${{ needs.create-release.outputs.new_version }}

            **Release Date**: ${{ github.event.repository.updated_at }}
            **Commit**: ${{ github.sha }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Supported Boards
            - Wemos D1 Mini (`esp8266-oled-experiment_v${{ needs.create-release.outputs.new_version }}_esp8266_d1_mini.bin`)
            - NodeMCU v2 (`esp8266-oled-experiment_v${{ needs.create-release.outputs.new_version }}_esp8266_nodmcu.bin`)
            - Generic ESP8266 (`esp8266-oled-experiment_v${{ needs.create-release.outputs.new_version }}_esp8266_generic.bin`)

            ### Installation

            **Via OTA** (Recommended):
            ```
            1. Navigate to http://<device-ip>/update
            2. Select the .bin file for your board
            3. Upload and wait for reboot
            ```

            **Via PlatformIO**:
            ```bash
            pio run -e esp8266_d1_mini -t upload
            ```

            ### Verification
            ```bash
            sha256sum -c esp8266-oled-experiment_v${{ needs.create-release.outputs.new_version }}_esp8266_d1_mini.bin.sha256
            ```
          files: release_files/*
          draft: false
          prerelease: false
